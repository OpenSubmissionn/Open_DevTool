                - heading "Compute Units (CU)" [level=5] [ref=e175]
              - paragraph [ref=e176]: The unit Solana uses to meter execution cost. Each transaction has a budget (default 200,000 CU; this one was capped at 956,243). When exhausted, execution fails. Unlike Ethereum gas, CU is tracked per-instruction — that's why you can pinpoint exactly where 95,297 CU was spent in this tx.
            - generic [ref=e177]:
              - generic [ref=e178]:
                - generic [ref=e179]: i
                - heading "CPI (Cross-Program Invocation)" [level=5] [ref=e180]
              - paragraph [ref=e181]: When one program calls another mid-execution. CPIs are how composability works on Solana — but each level adds runtime overhead. This transaction had 15 program invocations across 3 nested levels.
            - generic [ref=e182]:
              - generic [ref=e183]:
                - generic [ref=e184]: i
                - heading "PDA (Program Derived Address)" [level=5] [ref=e185]
              - paragraph [ref=e186]: An address derived deterministically from a program ID and a set of seeds — no private key, no off-chain signer. PDAs are how programs own their own state without holding keys. Re-deriving a PDA on-chain costs CU, so most modern programs let callers pass it in as an input instead.
            - generic [ref=e187]:
              - generic [ref=e188]:
                - generic [ref=e189]: i
                - heading "Priority Fee" [level=5] [ref=e190]
              - paragraph [ref=e191]: A per-CU bid (priced in micro-lamports) the sender attaches via Compute Budget so the leader prioritises this tx during congestion. The base signature fee is fixed; the priority component scales with CU consumed × bid.
