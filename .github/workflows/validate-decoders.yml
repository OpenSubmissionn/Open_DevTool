name: Validate Decoders

on:
  pull_request:
    paths:
      - 'services/src/analysis/decoders/**'
      - 'services/src/data/program-registry.json'
      - 'scripts/validate-decoders.ts'

jobs:
  validate:
    name: Decoder structural validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run decoder validation
        run: npm run validate:decoders

      - name: Run decoder unit tests
        run: npm run test:unit --workspace @open/services -- --reporter=verbose
